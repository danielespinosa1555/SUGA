version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: suga_db
    environment:
      POSTGRES_DB: suga_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: suga_password
    ports:
      - "5432:5432"
    volumes:
      - suga_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: suga_api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: suga_db
      DB_USER: postgres
      DB_PASSWORD: suga_password
      JWT_SECRET: change_this_super_secret_key_in_production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "5000:5000"
    volumes:
      - suga_uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: suga_web
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"

volumes:
  suga_pgdata:
  suga_uploads:
